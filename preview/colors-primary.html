<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; font-family: 'Nunito', sans-serif; padding: 20px; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { flex: 1; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 12px rgba(139,69,19,.12); }
  .color { height: 80px; }
  .info { background: #fff; padding: 10px 12px; }
  .name { font-size: 11px; font-weight: 600; color: #8B4513; }
  .hex  { font-size: 13px; font-weight: 700; color: #020100; }
  .use  { font-size: 10px; color: #b08060; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch">
    <div class="color" style="background:#FF8C00;"></div>
    <div class="info"><div class="hex">#FF8C00</div><div class="name">Orange</div><div class="use">Primary CTA, icons, links</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#e67e00;"></div>
    <div class="info"><div class="hex">#e67e00</div><div class="name">Orange Dark</div><div class="use">Hover, gradient end</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#8B4513;"></div>
    <div class="info"><div class="hex">#8B4513</div><div class="name">Brown</div><div class="use">Headings, borders</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#654321;"></div>
    <div class="info"><div class="hex">#654321</div><div class="name">Brown Dark</div><div class="use">Footer bg, dark gradient</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#020100;"></div>
    <div class="info"><div class="hex">#020100</div><div class="name">Brown Black</div><div class="use">Body text</div></div>
  </div>
</div>
</body></html>
