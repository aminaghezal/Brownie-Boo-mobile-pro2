<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
  body { margin: 0; background: #FFF8DC; padding: 20px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  img { display: block; object-fit: contain; }
  .label { font-family: sans-serif; font-size: 10px; font-weight: 700; color: #b08060; text-align: center; text-transform: uppercase; letter-spacing: .06em; }
  .on-dark { background: #654321; border-radius: 14px; padding: 10px; }
  .on-cream { background: #FFF8DC; border-radius: 14px; padding: 10px; }
</style></head><body>
  <div class="logo-wrap">
    <div class="on-cream"><img src="../assets/logo.png" width="100" height="100" alt="Logo"></div>
    <div class="label">Primary Logo</div>
  </div>
  <div class="logo-wrap">
    <div class="on-dark"><img src="../assets/logo-no-bg.png" width="80" height="80" alt="No-bg Logo"></div>
    <div class="label">On Dark</div>
  </div>
  <div class="logo-wrap">
    <div class="on-cream"><img src="../assets/logo-bear-circle.png" width="90" height="90" alt="Bear Circle"></div>
    <div class="label">Bear Badge</div>
  </div>
  <div class="logo-wrap">
    <div class="on-cream" style="background:#FDEBD0;"><img src="../assets/logo-cute-brownie.png" width="90" height="90" alt="Cute Brownie"></div>
    <div class="label">Kawaii Brownie</div>
  </div>
</body></html>
