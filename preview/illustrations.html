<!DOCTYPE html><html><head><meta charset="UTF-8">

  img { display: block; border-radius: 12px; object-fit: contain; }

</style></head><body>
  <div class="item">
    <img src="../assets/illustration-bear-box.png" width="140" height="140" alt="Bear Box">

  </div>
  <div class="item">
    <img src="../assets/illustration-bear-chef.png" width="140" height="140" alt="Bear Chef">
    <div class="label">Bear Chef<br>Line-art</div>
  </div>
  <div class="item">
    <img src="../assets/hero-brownies.png" width="140" height="140" alt="Hero">
    <div class="label">Hero Photo<br>Brownies</div>
  </div>
  <div class="item">
    <img src="../assets/box-party.jpg" width="120" height="120" style="border-radius:12px;" alt="Party">

  </div>
