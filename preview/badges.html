<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; padding: 24px; font-family: 'Nunito', sans-serif; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .label { font-size: 10px; font-weight: 700; color: #b08060; text-transform: uppercase; letter-spacing:.06em; margin-bottom: 8px; }
  .badge { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; }
  .b-orange { background:rgba(255,140,0,.15); color:#FF8C00; border:1px solid rgba(255,140,0,.3); }
  .b-brown  { background:rgba(139,69,19,.1); color:#8B4513; border:1px solid rgba(139,69,19,.2); }
  .b-yellow { background:#edfd0b; color:#8B4513; }
  .b-green  { background:#32CD32; color:#fff; }
  .b-gold   { background:#FFD700; color:#8B4513; }
  .b-dark   { background:linear-gradient(135deg,#FF8C00,#e67e00); color:#fff; }
  .popular { position:relative; display:inline-block; background:#edfd0b; color:#8B4513; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; }
</style></head><body>
  <div class="label">Functional Badges</div>
  <div class="row">
    <span class="badge b-orange"><i class="fas fa-sparkles"></i> Handcrafted with Love</span>
    <span class="badge b-brown"><i class="fas fa-star"></i> 5.0 Rating</span>
    <span class="badge b-yellow">Popular</span>
    <span class="badge b-dark">Most Popular</span>
  </div>
  <div class="label">Box Type Badges</div>
  <div class="row">
    <span class="badge b-orange" style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;">Personalized</span>
    <span class="badge b-green" style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;">Celebration</span>
    <span class="badge b-gold" style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;">Premium</span>
  </div>
  <div class="label">Nav / Pill</div>
  <div class="row">
    <span class="badge b-brown">Home</span>
    <span class="badge b-brown">Flavours</span>
    <span class="badge b-brown">Menu</span>
    <span class="badge b-brown">Contact</span>
  </div>
</body></html>
