<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; padding: 24px; font-family: 'Nunito', sans-serif; }
  .form-card { background: #fff; border-radius: 20px; padding: 20px 24px; box-shadow: 0 10px 30px rgba(139,69,19,.1); max-width: 480px; }
  .row { display: flex; gap: 14px; margin-bottom: 14px; }
  .group { display: flex; flex-direction: column; flex: 1; gap: 5px; }
  label { font-size: 12px; font-weight: 700; color: #8B4513; }
  input, textarea, select {
    padding: 10px 12px; border: 2px solid rgba(139,69,19,.2); border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 13px; background: #fff; color: #020100;
    transition: border-color .2s, box-shadow .2s; outline: none;
  }
  input:focus, textarea:focus { border-color: #FF8C00; box-shadow: 0 0 0 3px rgba(255,140,0,.1); }
  .input-focused { border-color: #FF8C00 !important; box-shadow: 0 0 0 3px rgba(255,140,0,.1); }
  textarea { resize: none; }
  .btn { background: linear-gradient(135deg,#FF8C00,#e67e00); color: #fff; border: none; border-radius: 12px;
    padding: 11px 0; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
    width: 100%; cursor: pointer; margin-top: 4px; }
</style></head><body>
<div class="form-card">
  <div class="row">
    <div class="group">
      <label>Your Name</label>
      <input type="text" placeholder="Enter your name">
    </div>
    <div class="group">
      <label>Email</label>
      <input type="email" value="amina@brownieboo.dz" class="input-focused">
    </div>
  </div>
  <div class="group" style="margin-bottom:14px;">
    <label>Your Message</label>
    <textarea rows="3" placeholder="Share your thoughts, feedback or suggestions…"></textarea>
  </div>
  <button class="btn">Send Message</button>
</div>
</body></html>
