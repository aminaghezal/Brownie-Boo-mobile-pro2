<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; font-family: 'Nunito', sans-serif; padding: 20px; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { flex: 1; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 12px rgba(139,69,19,.12); }
  .color { height: 80px; }
  .info { background: #fff; padding: 10px 12px; }
  .name { font-size: 11px; font-weight: 600; color: #8B4513; }
  .hex  { font-size: 13px; font-weight: 700; color: #020100; }
  .use  { font-size: 10px; color: #b08060; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch">
    <div class="color" style="background:#FFF8DC; border:1px solid #e8dcc0;"></div>
    <div class="info"><div class="hex">#FFF8DC</div><div class="name">Cream</div><div class="use">Page background</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#FFFEF7; border:1px solid #e8dcc0;"></div>
    <div class="info"><div class="hex">#FFFEF7</div><div class="name">Cream Light</div><div class="use">Gradient end</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#ddcdb9;"></div>
    <div class="info"><div class="hex">#ddcdb9</div><div class="name">Light Brown</div><div class="use">Dividers, muted borders</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#D2B48C;"></div>
    <div class="info"><div class="hex">#D2B48C</div><div class="name">Tan</div><div class="use">Decorative patterns</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#FFFFFF; border:1px solid #e0d8cc;"></div>
    <div class="info"><div class="hex">#FFFFFF</div><div class="name">White</div><div class="use">Cards, inputs</div></div>
  </div>
</div>
</body></html>
