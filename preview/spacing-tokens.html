<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; padding: 20px 24px; font-family: 'Nunito', sans-serif; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .token { font-size: 10px; font-weight: 700; color: #b08060; min-width: 72px; }
  .bar-wrap { flex: 1; background: #e8dcc0; border-radius: 4px; height: 12px; }
  .bar { background: linear-gradient(90deg,#FF8C00,#e67e00); border-radius: 4px; height: 100%; }
  .val { font-size: 11px; color: #8B4513; font-weight: 600; min-width: 36px; text-align: right; }
</style></head><body>
  <div class="row"><div class="token">space-1</div><div class="bar-wrap"><div class="bar" style="width:2%"></div></div><div class="val">4px</div></div>
  <div class="row"><div class="token">space-2</div><div class="bar-wrap"><div class="bar" style="width:4%"></div></div><div class="val">8px</div></div>
  <div class="row"><div class="token">space-3</div><div class="bar-wrap"><div class="bar" style="width:6%"></div></div><div class="val">12px</div></div>
  <div class="row"><div class="token">space-4</div><div class="bar-wrap"><div class="bar" style="width:8%"></div></div><div class="val">16px</div></div>
  <div class="row"><div class="token">space-6</div><div class="bar-wrap"><div class="bar" style="width:12%"></div></div><div class="val">24px</div></div>
  <div class="row"><div class="token">space-8</div><div class="bar-wrap"><div class="bar" style="width:16%"></div></div><div class="val">32px</div></div>
  <div class="row"><div class="token">space-10</div><div class="bar-wrap"><div class="bar" style="width:20%"></div></div><div class="val">40px</div></div>
  <div class="row"><div class="token">space-12</div><div class="bar-wrap"><div class="bar" style="width:24%"></div></div><div class="val">48px</div></div>
  <div class="row"><div class="token">space-16</div><div class="bar-wrap"><div class="bar" style="width:32%"></div></div><div class="val">64px</div></div>
  <div class="row"><div class="token">space-24</div><div class="bar-wrap"><div class="bar" style="width:48%"></div></div><div class="val">96px</div></div>
</body></html>
