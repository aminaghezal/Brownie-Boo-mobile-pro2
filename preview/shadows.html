<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; padding: 24px; font-family: 'Nunito', sans-serif; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100px; height: 56px; background: #fff; border-radius: 14px; }
  .label { font-size: 10px; font-weight: 700; color: #b08060; text-align: center; }
</style></head><body>
<div class="row">
  <div class="item">
    <div class="box" style="box-shadow: 0 4px 15px rgba(139,69,19,.1);"></div>
    <div class="label">Elevation 1<br>0 4px 15px</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 10px 30px rgba(139,69,19,.1);"></div>
    <div class="label">Elevation 2<br>0 10px 30px</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 20px 40px rgba(139,69,19,.2);"></div>
    <div class="label">Elevation 3 (hover)<br>0 20px 40px</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 4px 15px rgba(255,140,0,.3); background: linear-gradient(135deg,#FF8C00,#e67e00);"></div>
    <div class="label">Orange Glow<br>CTA button</div>
  </div>
  <div class="item">
    <div class="box" style="box-shadow: 0 8px 25px rgba(255,140,0,.3); background: linear-gradient(135deg,#FF8C00,#e67e00);"></div>
    <div class="label">Orange Glow lg<br>CTA hover</div>
  </div>
</div>
</body></html>
