<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; font-family: 'Nunito', sans-serif; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 100px; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 12px rgba(139,69,19,.12); }
  .color { height: 70px; }
  .info { background: #fff; padding: 10px 12px; }
  .name { font-size: 11px; font-weight: 600; color: #8B4513; }
  .hex  { font-size: 12px; font-weight: 700; color: #020100; }
  .use  { font-size: 10px; color: #b08060; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch">
    <div class="color" style="background:linear-gradient(135deg,#FF8C00,#e67e00);"></div>
    <div class="info"><div class="hex">Gradient Orange</div><div class="name">Primary CTA</div><div class="use">Buttons, icons, ratings</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:linear-gradient(135deg,#020100,#654321);"></div>
    <div class="info"><div class="hex">Gradient Brown</div><div class="name">Footer / Dark</div><div class="use">Footer background</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#edfd0b;"></div>
    <div class="info"><div class="hex">#edfd0b</div><div class="name">Yellow</div><div class="use">"Popular" badges</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#32CD32;"></div>
    <div class="info"><div class="hex">#32CD32</div><div class="name">Green</div><div class="use">Party / success</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#FFD700;"></div>
    <div class="info"><div class="hex">#FFD700</div><div class="name">Gold</div><div class="use">Special / premium</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:rgba(255,140,0,.15); border:1px solid rgba(255,140,0,.3);"></div>
    <div class="info"><div class="hex">Orange 15%</div><div class="name">Badge Fill</div><div class="use">Hero badge bg</div></div>
  </div>
</div>
</body></html>
