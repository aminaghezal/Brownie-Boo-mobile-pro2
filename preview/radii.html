<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #FFF8DC; padding: 24px; font-family: 'Nunito', sans-serif; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 40px; background: #fff; border: 2px solid #ddcdb9; }
  .label { font-size: 10px; font-weight: 700; color: #b08060; text-align: center; }
  .val { font-size: 11px; color: #8B4513; font-weight: 700; }
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:0;"></div><div class="label">None</div><div class="val">0px</div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="label">sm</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="border-radius:10px;"></div><div class="label">md · input</div><div class="val">10px</div></div>
  <div class="item"><div class="box" style="border-radius:12px;"></div><div class="label">btn</div><div class="val">12px</div></div>
  <div class="item"><div class="box" style="border-radius:15px;"></div><div class="label">btn-lg</div><div class="val">15px</div></div>
  <div class="item"><div class="box" style="border-radius:20px;"></div><div class="label">badge</div><div class="val">20px</div></div>
  <div class="item"><div class="box" style="border-radius:25px;"></div><div class="label">pill</div><div class="val">25px</div></div>
  <div class="item"><div class="box" style="border-radius:24px;"></div><div class="label">card</div><div class="val">1.5rem</div></div>
  <div class="item"><div class="box" style="border-radius:32px;"></div><div class="label">card-lg</div><div class="val">2rem</div></div>
  <div class="item"><div class="box" style="border-radius:9999px; width:40px; height:40px;"></div><div class="label">full<br>circle</div><div class="val">∞</div></div>
</div>
</body></html>
