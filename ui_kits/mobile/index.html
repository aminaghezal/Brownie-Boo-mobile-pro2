    .app-scroll { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; background: #FFF8DC; position: relative; }

    /* Screen transitions */

    /* Bottom nav */

    .nav-item.active .icon, .nav-item.active .nav-label { color: #FF8C00; }

    /* Common */

    .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #8B4513; }

    /* Pill tabs */

    /* Cards */

    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; font-weight: 700; transition: transform .15s; }
    .qty-btn:active { transform: scale(.88); }

    /* Cart badge */
    .cart-badge { position: absolute; top: -4px; right: -4px; background: #FF8C00; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; }

    .bb-btn-full:active { transform: scale(.97); }
    .bb-btn-full:disabled { background: #ddcdb9; color: #b08060; box-shadow: none; cursor: not-allowed; }

    .floating-cart { position: fixed; bottom: 80px; left: 16px; right: 16px; background: linear-gradient(135deg,#8B4513,#654321); color: #FFF8DC; border-radius: 18px; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 28px rgba(139,69,19,.35); cursor: pointer; transition: all .25s; z-index: 90; }

              ),
              React.createElement('div', { style: { padding: '9px 10px 12px' } },
                React.createElement('p', { style: { fontFamily: "'Playfair Display',serif", fontSize: 12, fontWeight: 700, color: '#8B4513', margin: '0 0 8px', lineHeight: 1.2 } }, f.short),
                React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
                  React.createElement('button', { className: 'qty-btn', onClick: () => onAddRemove(f.id, -1), disabled: !(quantities[f.id] > 0), style: { width: 28, height: 28, background: quantities[f.id] > 0 ? 'rgba(255,140,0,.12)' : 'rgba(139,69,19,.06)', color: quantities[f.id] > 0 ? '#FF8C00' : '#ccc' } }, '−'),
                  React.createElement('span', { style: { fontFamily: "'Nunito',sans-serif", fontWeight: 800, fontSize: 16, color: '#8B4513', minWidth: 20, textAlign: 'center' } }, quantities[f.id] || 0),
                  React.createElement('button', { className: 'qty-btn', onClick: () => onAddRemove(f.id, 1), disabled: remaining <= 0, style: { width: 28, height: 28, background: remaining > 0 ? 'linear-gradient(135deg,#FF8C00,#e67e00)' : '#e8dcc0', color: remaining > 0 ? '#fff' : '#b08060' } }, '+')
                )
              )
            )
          )
        ),

        // Floating cart / confirm
        total > 0 && React.createElement('div', { className: 'floating-cart', onClick: () => total >= BOX_SIZE && setSubmitted(true), style: { background: total >= BOX_SIZE ? 'linear-gradient(135deg,#FF8C00,#e67e00)' : 'linear-gradient(135deg,#8B4513,#654321)' } },
          React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
            React.createElement('div', { style: { background: 'rgba(255,255,255,.2)', borderRadius: '50%', width: 40, height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' } },
              React.createElement('i', { className: 'fas fa-shopping-basket', style: { fontSize: 16, color: '#fff' } }),
              React.createElement('span', { className: 'cart-badge' }, total)
            ),
            React.createElement('div', null,
              React.createElement('p', { style: { fontFamily: "'Nunito',sans-serif", fontSize: 14, fontWeight: 800, color: '#fff', margin: 0 } }, total >= BOX_SIZE ? 'Place Order →' : `${remaining} more to go`),
              cartItems.length > 0 && React.createElement('p', { style: { fontFamily: "'Nunito',sans-serif", fontSize: 11, color: 'rgba(255,255,255,.8)', margin: 0 } }, cartItems.slice(0, 2).map(f => f.short).join(', ') + (cartItems.length > 2 ? `…` : ''))
            )
          ),
          total >= BOX_SIZE && React.createElement('div', { style: { background: 'rgba(255,255,255,.25)', borderRadius: 10, padding: '8px 14px' } },
            React.createElement('span', { style: { fontFamily: "'Nunito',sans-serif", fontSize: 14, fontWeight: 800, color: '#fff' } }, 'Confirm')
          )
        )
      );
    };

    /* ─── PROFILE / CONTACT SCREEN ─── */
    const ProfileScreen = () => {
      const [sent, setSent] = React.useState(false);
      return React.createElement('div', { className: 'screen', style: { paddingBottom: 80 } },
        // Top
        React.createElement('div', { style: { background: 'linear-gradient(135deg,#8B4513,#654321)', padding: '28px 20px 32px', textAlign: 'center' } },
          React.createElement('img', { src: '../../assets/logo-no-bg.png', alt: 'Logo', style: { width: 72, height: 72, objectFit: 'contain', marginBottom: 10, filter: 'brightness(10)' } }),
          React.createElement('h2', { style: { fontFamily: "'Playfair Display',serif", fontSize: 22, fontWeight: 700, color: '#FFF8DC', margin: 0 } }, 'Brownie Boo'),
          React.createElement('p', { style: { fontFamily: "'Nunito',sans-serif", fontSize: 13, color: 'rgba(255,248,220,.7)', marginTop: 4 } }, 'Oran, Algérie')
        ),
        // Contact info
        React.createElement('div', { style: { padding: '20px 16px 0' } },
          [['fas fa-envelope', 'brownieboo@gmail.com', '#FF8C00'], ['fas fa-phone', '0657757691', '#FF8C00'], ['fas fa-map-marker-alt', 'Oran, Algérie', '#FF8C00']].map(([ic, t, c]) =>
            React.createElement('div', { key: t, style: { display: 'flex', alignItems: 'center', gap: 14, background: '#fff', borderRadius: 14, padding: '14px 16px', marginBottom: 10, boxShadow: '0 3px 12px rgba(139,69,19,.08)' } },
              React.createElement('div', { style: { width: 38, height: 38, background: 'rgba(255,140,0,.1)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' } },
                React.createElement('i', { className: ic, style: { color: c, fontSize: 15 } })
              ),
              React.createElement('span', { style: { fontFamily: "'Nunito',sans-serif", fontSize: 14, color: '#8B4513', fontWeight: 600 } }, t)
            )
          ),
          // Message form
          React.createElement('div', { style: { background: '#fff', borderRadius: 20, padding: '20px', boxShadow: '0 6px 20px rgba(139,69,19,.1)', marginTop: 6 } },
            React.createElement('h4', { style: { fontFamily: "'Playfair Display',serif", fontSize: 18, color: '#8B4513', margin: '0 0 14px' } }, 'Send a Message'),
            sent
              ? React.createElement('div', { style: { textAlign: 'center', padding: '20px 0' } },
                  React.createElement('p', { style: { fontSize: 36, margin: '0 0 8px' } }, '💌'),
                  React.createElement('p', { style: { fontFamily: "'Nunito',sans-serif", color: '#8B4513', fontWeight: 700 } }, "Message sent! We'll reply soon."),
                  React.createElement('button', { style: { marginTop: 12, background: 'none', border: 'none', color: '#FF8C00', fontFamily: "'Nunito',sans-serif", fontWeight: 700, cursor: 'pointer', fontSize: 14 }, onClick: () => setSent(false) }, 'Send another →')
                )
              : React.createElement('form', { onSubmit: e => { e.preventDefault(); setSent(true); } },
                  ['Name', 'Email', 'Message'].map(field =>
                    field === 'Message'
                      ? React.createElement('div', { key: field, style: { marginBottom: 12 } },
                          React.createElement('label', { style: { display: 'block', fontFamily: "'Nunito',sans-serif", fontSize: 12, fontWeight: 700, color: '#8B4513', marginBottom: 5 } }, field),
                          React.createElement('textarea', { rows: 3, required: true, placeholder: 'Your message…', style: { width: '100%', padding: '10px 12px', border: '2px solid rgba(139,69,19,.18)', borderRadius: 10, fontFamily: "'Nunito',sans-serif", fontSize: 14, resize: 'none', outline: 'none' } })
                        )
                      : React.createElement('div', { key: field, style: { marginBottom: 12 } },
                          React.createElement('label', { style: { display: 'block', fontFamily: "'Nunito',sans-serif", fontSize: 12, fontWeight: 700, color: '#8B4513', marginBottom: 5 } }, field),
                          React.createElement('input', { type: field === 'Email' ? 'email' : 'text', required: true, placeholder: `Your ${field.toLowerCase()}`, style: { width: '100%', padding: '10px 12px', border: '2px solid rgba(139,69,19,.18)', borderRadius: 10, fontFamily: "'Nunito',sans-serif", fontSize: 14, outline: 'none' } })
                        )
                  ),
                  React.createElement('button', { type: 'submit', className: 'bb-btn-full', style: { marginTop: 4 } }, 'Send Message')
                )
          )
        )
      );
    };

    /* ─── ROOT APP ─── */
    const NAV_ITEMS = [
      { id: 'home',     icon: 'fas fa-home',         label: 'Home' },
      { id: 'flavours', icon: 'fas fa-cookie-bite',   label: 'Flavours' },
      { id: 'choose',   icon: 'fas fa-box-open',      label: 'Order' },
      { id: 'order',    icon: 'fas fa-shopping-basket', label: 'Cart' },
      { id: 'profile',  icon: 'fas fa-envelope',      label: 'Contact' },
    ];

    const App = () => {
      const [page, setPage] = React.useState('home');
      const [quantities, setQuantities] = React.useState({});

      const totalInCart = Object.values(quantities).reduce((s, v) => s + v, 0);

      const handleAddRemove = (id, delta) => {
        setQuantities(prev => {
          const cur = prev[id] || 0;
          const totalCur = Object.values(prev).reduce((s, v) => s + v, 0);
          if (delta > 0 && totalCur >= BOX_SIZE) return prev;
          const next = Math.max(0, cur + delta);
          return { ...prev, [id]: next };
        });
      };

      const navigate = (to) => {
        setPage(to);
      };

      const renderScreen = () => {
        switch (page) {
          case 'home':     return React.createElement(HomeScreen, { onNav: navigate });
          case 'flavours': return React.createElement(FlavoursScreen, { quantities, onAddRemove: handleAddRemove });
          case 'choose':   return React.createElement(ChooseScreen, { onNav: navigate });
          case 'order':    return React.createElement(OrderScreen, { quantities, onAddRemove: handleAddRemove, onNav: navigate });
          case 'profile':  return React.createElement(ProfileScreen);
          default:         return React.createElement(HomeScreen, { onNav: navigate });
        }
      };

      return React.createElement(IOSDevice, { appName: 'Brownie Boo' },
        React.createElement('div', { className: 'app-scroll' },
          renderScreen(),
          React.createElement('nav', { className: 'bottom-nav' },
            NAV_ITEMS.map(item =>
              React.createElement('button', {
                key: item.id,
                className: `nav-item ${page === item.id ? 'active' : ''}`,
                onClick: () => navigate(item.id)
              },
                React.createElement('div', { style: { position: 'relative' } },
                  React.createElement('i', { className: item.icon, style: { fontSize: 20 } }),
                  item.id === 'order' && totalInCart > 0 && React.createElement('span', { className: 'cart-badge' }, totalInCart)
                ),
                React.createElement('span', { className: 'nav-label' }, item.label)
              )
            )
          )
        )
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
